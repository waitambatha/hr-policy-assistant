<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — HR Policy Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ── */
    :root {
      --bg:          #f5f6fa;
      --bg2:         #ffffff;
      --bg3:         #eef0f6;
      --text:        #111827;
      --text2:       #6b7280;
      --text3:       #9ca3af;
      --border:      rgba(0,0,0,0.08);
      --border2:     rgba(0,0,0,0.15);
      --accent:      #4f6ef7;
      --accent-soft: rgba(79,110,247,0.09);
      --accent-glow: rgba(79,110,247,0.2);
      --danger:      #e05a5a;
      --danger-soft: rgba(224,90,90,0.08);
      --shadow:      0 4px 24px rgba(0,0,0,0.07);
      --shadow-lg:   0 16px 48px rgba(0,0,0,0.11);
    }
    [data-theme="dark"] {
      --bg:          #0d1117;
      --bg2:         #161b22;
      --bg3:         #1c2230;
      --text:        #e6edf3;
      --text2:       #8b949e;
      --text3:       #484f58;
      --border:      rgba(99,120,170,0.14);
      --border2:     rgba(99,140,255,0.28);
      --accent:      #4f79f6;
      --accent-soft: rgba(79,121,246,0.1);
      --accent-glow: rgba(79,121,246,0.22);
      --shadow:      0 4px 24px rgba(0,0,0,0.4);
      --shadow-lg:   0 16px 48px rgba(0,0,0,0.6);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, var(--accent-soft) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(79,110,247,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--bg2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: 0.2s ease;
      z-index: 100;
    }
    .theme-toggle:hover { background: var(--bg3); }

    /* Card */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
      position: relative;
      z-index: 1;
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 40px; right: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      border-radius: 0 0 4px 4px;
    }

    /* Brand mark */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      animation: fadeUp 0.5s ease 0.1s both;
    }
    .brand-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    /* Heading */
    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 6px;
      animation: fadeUp 0.5s ease 0.15s both;
    }
    .card-sub {
      font-size: 13.5px;
      color: var(--text2);
      margin-bottom: 30px;
      animation: fadeUp 0.5s ease 0.2s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    /* Error */
    .error-box {
      background: var(--danger-soft);
      border: 1px solid rgba(224,90,90,0.22);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--danger);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: fadeUp 0.3s ease both;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
      animation: fadeUp 0.5s ease both;
    }
    .form-group:nth-child(1) { animation-delay: 0.25s; }
    .form-group:nth-child(2) { animation-delay: 0.3s; }
    .form-group:nth-child(3) { animation-delay: 0.35s; }

    label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--text2);
      margin-bottom: 7px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
      opacity: 0.5;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px 11px 38px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      transition: 0.2s ease;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      background: var(--bg2);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input::placeholder { color: var(--text3); }

    /* Toggle password visibility */
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: var(--text3);
      padding: 2px;
      line-height: 1;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--text2); }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s cubic-bezier(0.34,1.56,0.64,1);
      margin-top: 6px;
      letter-spacing: 0.2px;
      animation: fadeUp 0.5s ease 0.38s both;
    }
    .btn-submit:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
    .btn-submit:active { transform: translateY(0) scale(0.98); }

    /* Footer link */
    .card-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: var(--text2);
      animation: fadeUp 0.5s ease 0.42s both;
    }
    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .card-footer a:hover { text-decoration: underline; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: var(--text3);
      font-size: 11.5px;
      animation: fadeUp 0.5s ease 0.35s both;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>

<div class="card">
  <div class="brand">
    <div class="brand-icon">📋</div>
    <span class="brand-name">HR Policy Assistant</span>
  </div>

  <h1 class="card-title">Welcome back</h1>
  <p class="card-sub">Sign in to your workspace</p>

  {% if error %}
  <div class="error-box"><span>⚠</span><span>{{ error }}</span></div>
  {% endif %}

  <form method="POST" autocomplete="on">
    {% csrf_token %}

    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePwd()" title="Toggle visibility">👁</button>
      </div>
    </div>

    <button type="submit" class="btn-submit">Sign In →</button>
  </form>

  <div class="card-footer">
    Don't have an account? <a href="{% url 'signup' %}">Create one</a>
  </div>
</div>

<script>
  // Theme
  const root = document.documentElement;
  const btn  = document.getElementById('themeToggle');
  let dark = localStorage.getItem('hr-theme') === 'dark';
  function applyTheme() {
    root.setAttribute('data-theme', dark ? 'dark' : 'light');
    btn.textContent = dark ? '☀️' : '🌙';
  }
  btn.addEventListener('click', () => { dark = !dark; localStorage.setItem('hr-theme', dark ? 'dark' : 'light'); applyTheme(); });
  applyTheme();

  // Toggle password
  function togglePwd() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
